<svg width="120" height="44" viewBox="0 0 120 44" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title">
  <title id="title">VA Consulting</title>
  <defs>
    <!-- Diagonal cut: strip that slices through right of V and left of A -->
    <mask id="va-mask">
      <rect width="120" height="44" fill="white"/>
      <path fill="black" d="M24 2 L36 2 L42 44 L30 44 Z"/>
    </mask>
  </defs>
  <!-- Bold geometric VA: V (two arms) + A (triangle + crossbar + right leg), then mask for cut -->
  <g mask="url(#va-mask)" fill="#FFFFFF">
    <!-- V left arm -->
    <path d="M6 10 L18 38 L24 38 L12 10 Z"/>
    <!-- V right arm -->
    <path d="M42 10 L26 38 L18 38 L34 10 Z"/>
    <!-- A: left leg -->
    <path d="M46 38 L54 12 L62 38 Z"/>
    <!-- A: crossbar -->
    <path d="M52 24 L64 24 L64 28 L52 28 Z"/>
    <!-- A: right leg -->
    <path d="M72 38 L64 12 L82 10 L90 38 Z"/>
  </g>
</svg>
